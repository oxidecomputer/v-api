name: lint

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.ref_name == 'main' && github.sha || 'anysha' }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - run: |
          cargo fmt --all -- --check
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - run: |
          rustup toolchain install
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: |
          cargo clippy --all-features --workspace --all-targets -- -Dwarnings

  lock_machete:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - run: |
          rustup toolchain install
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: |
          cargo install cargo-machete
      - run: |
          cargo machete
      - name: Ensure Cargo.lock is current
        run: |
          cargo check
          if ! git diff --quiet -- Cargo.lock; then
            echo "Cargo.lock is out of date"
            {
              echo "## Cargo.lock is out of date"
              echo 'Run "cargo check" locally and commit the updated Cargo.lock.'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::group::Cargo.lock diff"
            git diff -- Cargo.lock
            echo "::endgroup::"
            exit 1
          fi
